<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — Resume Analyzer</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  {% include "_nav.html" %}
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="scan-eyebrow" style="margin-bottom: 10px;">GET STARTED</div>
      <h1 class="auth-title">Create an account</h1>
      <p class="subhead-sm" style="margin-bottom: 28px;">Free to sign up — takes under a minute.</p>

      {% if error %}
        <div class="flash">{{ error }}</div>
      {% endif %}

      <form action="{{ url_for('auth.register') }}" method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div class="field">
          <label class="field-label">Name</label>
          <input type="text" name="name" required class="text-input" autofocus>
        </div>

        <div class="field">
          <label class="field-label">Email</label>
          <input type="email" name="email" required class="text-input">
        </div>

        <div class="field">
          <label class="field-label">Password <span class="optional-tag">min. 8 characters</span></label>
          <input type="password" name="password" required minlength="8" class="text-input">
        </div>

        <button class="submit" type="submit">Register</button>
      </form>

      <p class="auth-switch">
        Already have an account? <a href="{{ url_for('auth.login_page') }}">Log in</a>
      </p>
    </div>
  </div>
</body>
</html>
