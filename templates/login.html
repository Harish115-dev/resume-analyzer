<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In — Resume Analyzer</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  {% include "_nav.html" %}
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="scan-eyebrow" style="margin-bottom: 10px;">WELCOME BACK</div>
      <h1 class="auth-title">Log in</h1>
      <p class="subhead-sm" style="margin-bottom: 28px;">Pick up where you left off.</p>

      {% if error %}
        <div class="flash">{{ error }}</div>
      {% endif %}
      {% with messages = get_flashed_messages() %}
        {% if messages %}
          {% for message in messages %}
            <div class="flash">{{ message }}</div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <form action="{{ url_for('auth.login') }}" method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div class="field">
          <label class="field-label">Email</label>
          <input type="email" name="email" required class="text-input" autofocus>
        </div>

        <div class="field">
          <label class="field-label">Password</label>
          <input type="password" name="password" required class="text-input">
        </div>

        <button class="submit" type="submit">Log in</button>
      </form>

      <p class="auth-switch">
        Don't have an account? <a href="{{ url_for('auth.register_page') }}">Register</a>
      </p>
    </div>
  </div>
</body>
</html>
